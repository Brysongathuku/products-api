server:
  port: ${PORT:8080}

spring:
  application:
    name: inventory-app
  datasource:
    url: jdbc:postgresql://ep-tiny-lake-admxa02l.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:c2VjdXJlLXBlc2lyYS1hc3Nlc3NtZW50LWp3dC1zaWduaW5nLWtleS1jaGFuZ2UtbWU=}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24h

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
